name: Vahan Dashboard Scraper PanIndia

on:
  schedule:
    # Automatically runs every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows you to manually trigger the scraper from the GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120 # Elevated timeout since your script processes 30+ states

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Speeds up subsequent runs by caching packages

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright

    - name: Ensure Playwright browsers and system dependencies are installed
      run: |
        playwright install chromium --with-deps

    - name: Run Web Scraper
      run: python3 main.py

    - name: Upload Scraped CSV Data as Artifact
      uses: actions/upload-artifact@v4
      if: always() # Forces artifact upload even if the script hits a timeout midway
      with:
        name: vahan-scraped-data
        path: Panindia_*.csv
        retention-days: 14